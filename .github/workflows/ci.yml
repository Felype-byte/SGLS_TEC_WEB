name: CI/CD Pipeline - SGLS TEC WEB

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14' 

    - name: Instalar dependências (Build)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Testes
      run: |
        python -m pytest

  deploy-producao:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main' 
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' 

      - name: Instalar o gerenciador 'uv' (Exigido pela Vercel)
        run: pip install uv
        
      - name: Puxar Informações do Ambiente Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
      - name: Build do Projeto Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
      - name: Deploy na Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}